# Project-wide Gradle settings

# Speed up builds by running things in parallel
org.gradle.parallel=true

# Use AndroidX libraries instead of the old support libraries
android.useAndroidX=true

# Give Gradle enough memory to work with
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Non-transitive R classes keep things tidy
android.nonTransitiveRClass=true
